<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bentukin - VRChat Model Store</title>
  <link rel="stylesheet" href="styles.css" />
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.1.0/model-viewer.min.js"></script>
</head>
<body>
  <header class="header">
    <nav class="nav">
      <a href="index.html" class="logo">Bentukin</a>
      <ul class="nav-links">
        <li><a href="shop.html" class="active">Toko</a></li>
        <li><a href="index.html#about">Tentang</a></li>
        <li><a href="index.html#contact">Kontak</a></li>
      </ul>
    </nav>
  </header>

  <section class="shop-hero">
    <div class="container">
      <h1 class="shop-hero-title">VRChat Model Store</h1>
      <p class="shop-hero-desc">Model 3D berkualitas tinggi untuk VRChat. Format VRM siap pakai.</p>
      <div class="shop-hero-links">
        <a href="https://bentukin.booth.pm/" target="_blank" class="btn btn-primary">Booth PM</a>
        <a href="https://bentukin.gumroad.com/" target="_blank" class="btn btn-outline">Gumroad</a>
      </div>
    </div>
  </section>

  <section class="section">
    <div class="container">
      <div class="filter-bar">
        <button class="filter-btn active" data-filter="all">Semua</button>
        <button class="filter-btn" data-filter="VRM">VRM</button>
        <button class="filter-btn" data-filter="Premium">Premium</button>
        <button class="filter-btn" data-filter="Exclusive">Exclusive</button>
      </div>
      <div class="shop-grid" id="shopGrid"></div>
    </div>
  </section>

  <footer class="footer">
    <p>&copy; 2026 Bentukin. All rights reserved.</p>
  </footer>

  <template id="modelCard">
    <div class="model-card">
      <div class="model-card-preview">
        <model-viewer
          class="mini-viewer"
          src=""
          alt="3D Model Preview"
          camera-controls
          disable-zoom
          auto-rotate
          rotation-per-second="30deg"
          shadow-intensity="1"
          exposure="1"
          tone-mapping="neutral"
        ></model-viewer>
        <div class="model-card-overlay">
          <span class="model-format-badge"></span>
        </div>
      </div>
      <div class="model-card-body">
        <h3 class="model-name"></h3>
        <p class="model-desc"></p>
        <div class="model-tags"></div>
        <div class="model-card-footer">
          <span class="model-price"></span>
          <div class="model-buy-btns">
            <a href="" target="_blank" class="btn btn-primary btn-sm buy-gumroad">Gumroad</a>
            <a href="" target="_blank" class="btn btn-outline btn-sm buy-booth">Booth</a>
          </div>
        </div>
      </div>
    </div>
  </template>

  <script src="script.js"></script>
</body>
</html>
